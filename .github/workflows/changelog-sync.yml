name: Changelog Sync

on:
  push:
    branches-ignore:
      - gh-pages
    paths:
      - CHANGELOG.md
      - docs/scripts/update_changelog.jl
      - .github/workflows/changelog-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
      - name: Update generated changelog outputs
        run: julia docs/scripts/update_changelog.jl
      - name: Commit generated changelog outputs
        run: |
          if [[ -n "$(git status --porcelain README.md docs/src/index.md docs/src/changelog.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md docs/src/index.md docs/src/changelog.md
            git commit -m "docs: sync changelog outputs [skip ci]"
            git push
          else
            echo "Generated changelog outputs are already up to date."
          fi
